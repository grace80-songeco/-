<!DOCTYPE html>
<html>
<head>
  <title>YouTube Viewer (API)</title>
  <script src="https://www.youtube.com/iframe_api"></script>  <!-- API 로드 -->
</head>
<body>
  <h1>YouTube Viewer</h1>
  <input type="text" id="vid" placeholder="Video ID (예: 9ChITEs289o)">
  <button onclick="playVideo()">Play</button>
  <div id="player"></div>  <!-- 여기 플레이어 생성 -->

  <script>
  var player;
  function onYouTubeIframeAPIReady() {
    // API 준비 완료 시 호출됨
  }

  function playVideo() {
    var id = document.getElementById('vid').value.trim();
    if (id && !player) {
      player = new YT.Player('player', {
        height: '315',
        width: '560',
        videoId: id,
        playerVars: {
          'autoplay': 1,
          'mute': 0,          // 필요시 1로 mute
          'controls': 1,      // 0으로 숨기기
          'rel': 0,           // 관련 영상 OFF
          'modestbranding': 1 // YouTube 로고 최소화
        },
        events: {
          'onReady': onPlayerReady
        }
      });
    } else if (player) {
      player.loadVideoById(id);
      player.playVideo();
    }
  }

  function onPlayerReady(event) {
    event.target.playVideo();  // 자동 재생
  }
  </script>
</body>
</html>
